<script>
  // Try primary Tailwind CDN; if blocked in Claude preview, fall back to unpkg.
  (function loadTailwind(){
    var primary = document.createElement('script');
    primary.src = 'https://cdn.tailwindcss.com';
    primary.onload = function(){ window.__tw_apply_config && window.__tw_apply_config(); };
    primary.onerror = function(){
      var fb = document.createElement('script');
      fb.src = 'https://unpkg.com/@tailwindcss/browser@4';
      fb.onload = function(){
        window.__tw_apply_config && window.__tw_apply_config();
        if (window.__tw_retry_render) window.__tw_retry_render();
      };
      document.head.appendChild(fb);
    };
    document.head.appendChild(primary);
  })();
  window.__tw_apply_config = function(){
    if (typeof tailwind === 'undefined') return;
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sb-primary':   '#0F4C94',
            'sb-sidebar':   '#1F4B8F',
            'sb-page':      '#F5F7FB',
            'sb-card':      '#FFFFFF',
            'sb-border':    '#E7E8EC',
            'sb-divider':   '#D3D9DE',
            'sb-text':      '#333333',
            'sb-muted':     '#777777',
            'sb-placeholder': '#555555',
            'sb-error':     '#FF4D4F',
            'sb-th':        '#F9FAFB',
            'sb-rowhover':  '#F5F7FB',
            'sb-search':    '#F1F3F7',
            'sb-sidetext':  '#C7D2E5',
            'sb-sidelabel': '#9FB3D9',
          },
          fontFamily: {
            mont: ['Montserrat', 'system-ui', 'sans-serif'],
            hanken: ['"Hanken Grotesk"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.04)',
            modal:'0 20px 50px rgba(16,24,40,0.18), 0 4px 12px rgba(16,24,40,0.08)',

      />
    </div>

}

function ExportCSVButton({ rows, columns, filename, disabled }) {
  const onClick = () => {
    const head = columns.map(c => c.label).join(',');
    const body = rows.map(r => columns.map(c => {
      const v = c.csv ? c.csv(r) : (r[c.key] ?? '');
      const s = String(v).replace(/"/g,'""');
      return /[",\n]/.test(s) ? `"${s}"` : s;
    }).join(',')).join('\n');
    const blob = new Blob([head+'\n'+body], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename || 'export.csv'; a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <button
      disabled={disabled}
      onClick={onClick}
      className={[
        "h-9 px-3 rounded-lg font-mont font-semibold text-[13px] inline-flex items-center gap-2 border transition-colors",
        disabled
          ? "bg-sb-page text-sb-muted border-sb-border cursor-not-allowed"
          : "bg-white text-sb-text border-sb-border hover:bg-sb-page"
      ].join(' ')}
      title={disabled ? "Employees can't export" : "Export CSV"}
    >
      <Icon name="export" className="w-[15px] h-[15px]" />
      Export CSV
    </button>
  );
}

function SortDropdown({ columns, sortKey, sortDir, onChange }) {
  const [open, setOpen] = useState(false);
  const current = columns.find(c => c.key === sortKey);
  return (
    <div className="relative">
      <button
        onClick={() => setOpen(o => !o)}
        onBlur={() => setTimeout(() => setOpen(false), 120)}
        className="h-9 px-3 rounded-lg border border-sb-border bg-white text-sb-text font-mont font-semibold text-[13px] inline-flex items-center gap-2 hover:bg-sb-page"
      >
        <Icon name="sort" className="w-[15px] h-[15px]" />
        Sort: {current?.label ?? '—'} {sortDir === 'asc' ? '↑' : '↓'}
      </button>
      {open && (
        <div className="absolute left-0 mt-1 w-[220px] bg-white border border-sb-border rounded-lg shadow-card z-20 p-1">
          {columns.filter(c => c.sortable !== false).map(c => (
            <button key={c.key}
              onMouseDown={() => { onChange(c.key, sortKey===c.key && sortDir==='asc' ? 'desc' : 'asc'); setOpen(false); }}
              className={[
                "w-full text-left px-2.5 py-1.5 rounded-md font-mont text-[13px] flex items-center justify-between",
                sortKey === c.key ? "bg-sb-page text-sb-primary font-semibold" : "text-sb-text hover:bg-sb-page"
              ].join(' ')}>
              {c.label}
              {sortKey === c.key && <Icon name={sortDir==='asc'?'sortAsc':'sortDesc'} className="w-3.5 h-3.5" />}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Pagination({ page, pageCount, onPage }) {
  if (pageCount <= 1) return null;
  const pages = [];
  const push = (p) => pages.push(p);
  push(1);
  if (page > 3) push('…1');
  for (let p = Math.max(2, page-1); p <= Math.min(pageCount-1, page+1); p++) push(p);
  if (page < pageCount-2) push('…2');
  if (pageCount > 1) push(pageCount);

  const Btn = ({children, active, onClick, disabled, title}) => (
    <button
      onClick={onClick}
      disabled={disabled}
      title={title}
      className={[
        "h-8 min-w-[32px] px-2 rounded-md font-mont text-[12px] font-semibold transition-colors",
        active ? "bg-sb-primary text-white"
               : disabled ? "border border-sb-border text-sb-border cursor-not-allowed"
                          : "border border-sb-border text-sb-text hover:bg-sb-page"
      ].join(' ')}
    >{children}</button>
  );

  return (
    <div className="flex items-center gap-1">
      <Btn onClick={() => onPage(page-1)} disabled={page===1} title="Previous">‹</Btn>
      {pages.map((p,i) => typeof p === 'string'
        ? <span key={i} className="px-1 text-sb-muted text-[12px]">…</span>
        : <Btn key={i} active={p===page} onClick={() => onPage(p)}>{p}</Btn>)}
      <Btn onClick={() => onPage(page+1)} disabled={page===pageCount} title="Next">›</Btn>
    </div>
  );
}

              <div className="flex flex-wrap gap-1.5">
                {f.options.map(opt => {
                  const sel = (values[f.key] || 'All') === opt;
                  return (
                    <button
                      key={opt}
                      onMouseDown={() => onChange(f.key, opt)}
                      className={[
                        "px-2.5 py-1 rounded-full font-mont text-[12px] border transition-colors",
                        sel ? "bg-sb-primary text-white border-sb-primary" : "bg-white text-sb-text border-sb-border hover:bg-sb-page"
                      ].join(' ')}
                    >{opt}</button>
                  );
                })}
              </div>
            </div>
          ))}

            <button
              onMouseDown={() => filters.forEach(f => onChange(f.key, 'All'))}

function DataTable({ rows, columns: rawColumns, pageSize = 8, emptyText = 'No matching rows.', onRowClick, addLabel, onAdd, hideSearch = false, hideSort = false, hideToolbar = false, showResultCount = false, searchPlaceholder, filters }) {
  const { role } = useApp();
  const columns = useMemo(
    () => rawColumns.filter(c => !(role !== 'Admin' && c.key === 'actions')),
    [rawColumns, role]
  );
  const [query, setQuery] = useState('');
  const [sortKey, setSortKey] = useState(columns[0].key);
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage] = useState(1);
  const [filterValues, setFilterValues] = useState(() => {
    const init = {};
    (filters || []).forEach(f => init[f.key] = 'All');
    return init;
  });

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    let list = rows;
    if (q) {
      list = list.filter(r => columns.some(c => {
        const v = c.search ? c.search(r) : r[c.key];
        return String(v ?? '').toLowerCase().includes(q);
      }));
    }
    if (filters) {
      filters.forEach(f => {
        const v = filterValues[f.key];
        if (v && v !== 'All') {
          list = list.filter(r => f.match ? f.match(r, v) : String(r[f.key] ?? '') === v);
        }
      });
    }
    list = [...list].sort((a, b) => {
      const av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
      const na = typeof av === 'number', nb = typeof bv === 'number';
      const cmp = (na && nb) ? (av - bv) : String(av).localeCompare(String(bv));
      return sortDir === 'asc' ? cmp : -cmp;
    });
    return list;
  }, [rows, query, sortKey, sortDir, columns, filters, filterValues]);

  const pageCount = Math.max(1, Math.ceil(filtered.length / pageSize));
  const safePage  = Math.min(page, pageCount);
  const view = filtered.slice((safePage-1)*pageSize, safePage*pageSize);

  useEffect(() => { setPage(1); }, [query, sortKey, sortDir]);

  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortKey(k); setSortDir('asc'); }
  };

  return (
    <section className="bg-sb-card border border-sb-border rounded-2xl shadow-card overflow-hidden">
      {!hideToolbar && (
      <div className="flex items-center gap-3 px-5 py-4 border-b border-sb-border flex-wrap">
        {!hideSearch && <SearchBar value={query} onChange={setQuery} placeholder={searchPlaceholder || "Search"} />}
        {filters && <FilterDropdown filters={filters} values={filterValues} onChange={(k,v)=>setFilterValues(s=>({...s,[k]:v}))} />}
        <div className="ml-auto flex items-center gap-2">
          {showResultCount && <span className="font-mont text-[12px] text-sb-muted hidden md:inline">{filtered.length} results</span>}
          <ExportCSVButton rows={filtered} columns={columns} filename="superbit-export.csv" disabled={role !== 'Admin'} />
          {addLabel && role === 'Admin' && (
            <button
              onClick={onAdd}
              className="h-9 px-3 rounded-lg bg-sb-primary text-white font-mont font-semibold text-[13px] inline-flex items-center gap-1.5 hover:brightness-110"
            >
              <Icon name="plus" className="w-[15px] h-[15px]" />
              {addLabel}
            </button>
          )}
        </div>
      </div>
      )}

      <div className="overflow-x-auto scroll-thin max-h-[560px]">
        <table className="w-full">
          <thead className="bg-sb-th sticky top-0 z-[1]">
            <tr>
              {columns.map(col => (
                <th key={col.key} className={[
                  "text-left font-mont font-semibold text-[11px] tracking-[0.08em] text-[#6B7280] py-3 px-5 select-none whitespace-nowrap",
                  col.key === 'actions' ? '' : 'uppercase',
                  col.align === 'right' ? 'text-right' : ''
                ].join(' ')}>
                  {col.sortable === false ? col.label : (
                    <button onClick={() => toggleSort(col.key)} className="inline-flex items-center gap-1 hover:text-sb-text">
                      {col.label}
                      {sortKey === col.key
                        ? <Icon name={sortDir==='asc'?'sortAsc':'sortDesc'} className="w-3.5 h-3.5" />
                        : <Icon name="sort" className="w-3.5 h-3.5 opacity-50" />}
                    </button>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {view.map(r => (
              <tr key={r.id}
                onClick={onRowClick ? () => onRowClick(r) : undefined}
                className={[
                  "border-t border-sb-border hover:bg-sb-rowhover transition-colors",
                  onRowClick ? "cursor-pointer" : ""
                ].join(' ')}>
                {columns.map(col => (
                  <td key={col.key}
                    onClick={col.key === 'actions' ? (e) => e.stopPropagation() : undefined}
                    className={[
                    "py-3.5 px-5 font-mont text-[13px] text-sb-text align-middle",
                    col.align === 'right' ? 'text-right' : ''
                  ].join(' ')}>
                    {col.render ? col.render(r) : r[col.key]}
                  </td>
                ))}
              </tr>
            ))}
            {view.length === 0 && (
              <tr><td colSpan={columns.length} className="py-12 text-center font-mont text-[13px] text-sb-muted">{emptyText}</td></tr>
            )}
          </tbody>
        </table>
      </div>

      <div className="flex items-center justify-between px-5 py-3 border-t border-sb-border">
        <div className="font-mont text-[12px] text-sb-muted">
          Showing {(safePage-1)*pageSize + 1}–{Math.min(safePage*pageSize, filtered.length)} of {filtered.length}
        </div>
        <Pagination page={safePage} pageCount={pageCount} onPage={setPage} />
      </div>
    </section>
  );
}

function Topbar({ onProfile, onLogout }) {
  const { role, setRole } = useApp();
  const [open, setOpen] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handleOutsideClick = (event) => {
      if (menuRef.current && !menuRef.current.contains(event.target)) {
        setOpen(false);
      }
    };
    document.addEventListener('mousedown', handleOutsideClick);
    return () => document.removeEventListener('mousedown', handleOutsideClick);
  }, [open]);

  return (
    <header className="bg-sb-card border-b border-sb-border h-[68px] flex items-center px-8 gap-6 sticky top-0 z-10">
      <div className="relative flex-1 max-w-[460px]">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#9AA4B2]">
          <Icon name="search" className="w-[18px] h-[18px]" />
        </span>
        <input
          className="font-hanken w-full h-[40px] pl-10 pr-3 rounded-lg bg-sb-search border border-[#E5E7EB] text-[14px] text-sb-text outline-none focus:border-sb-primary/40 focus:bg-white"
          placeholder="Search comedians, venues, fans…"
        />
      </div>
      <div className="ml-auto flex items-center gap-5">

        <div className="relative" ref={menuRef}>
          <button
            onClick={() => setOpen(o => !o)}
            className="flex items-center gap-3 pl-5 border-l border-sb-border h-9 hover:opacity-90"
          >
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-sb-primary to-[#1F4B8F] text-white flex items-center justify-center font-mont font-semibold text-[13px]">AM</div>
            <div className="leading-tight text-left">
              <div className="font-mont font-semibold text-[13px] text-sb-text">Asha Menon</div>
              <div className="font-mont text-[11px] text-sb-muted">{role}</div>
            </div>
            <Icon name="chevron" className={["w-4 h-4 text-sb-muted transition-transform", open?"rotate-180":""].join(' ')} />
          </button>
          {open && (
            <div className="absolute right-0 top-[52px] w-[240px] bg-white border border-sb-border rounded-xl shadow-modal z-30 p-1.5 sb-modal-in">
              <div className="px-3 py-2.5">
                <div className="font-mont font-semibold text-[13px] text-sb-text">Asha Menon</div>
                <div className="font-hanken text-[12px] text-sb-muted">asha.menon@superbit.com</div>
              </div>
              <div className="h-px bg-sb-border mx-1 my-1" />
              <button
                onMouseDown={() => { setOpen(false); onProfile && onProfile(); }}
                className="w-full text-left px-3 py-2 rounded-md font-mont text-[13px] text-sb-text hover:bg-sb-page flex items-center gap-2.5"
              >
                <Icon name="user" className="w-4 h-4 text-sb-muted" />
                Profile
              </button>
              <div className="h-px bg-sb-border mx-1 my-1" />
              <button
                onMouseDown={() => { setOpen(false); onLogout && onLogout(); }}
                className="w-full text-left px-3 py-2 rounded-md font-mont font-semibold text-[13px] text-[#D32F2F] hover:bg-[#FDECEC] flex items-center gap-2.5"
              >
                <Icon name="logout" className="w-4 h-4" />
                Log out
              </button>
            </div>
          )}
        </div>
      </div>
    </header>
  );
}

          <div className="mt-2.5 flex items-center gap-2">
            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white border border-sb-border font-mont text-[12px] text-sb-text">
              <span className="w-1.5 h-1.5 rounded-full bg-[#2E7D32]" />
              <span className="font-semibold">{counts.active.toLocaleString()}</span>
              <span className="text-sb-muted">Active</span>
            </span>
            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white border border-sb-border font-mont text-[12px] text-sb-text">
              <span className="w-1.5 h-1.5 rounded-full bg-sb-error" />
              <span className="font-semibold">{counts.inactive.toLocaleString()}</span>
              <span className="text-sb-muted">Suspended</span>

            {counts.pending != null && counts.pending > 0 && (

const buildCounts = (rows) => ({
  active:   rows.filter(r => r.status === 'Active').length,
  inactive: rows.filter(r => r.status === 'Suspended').length,
  pending:  rows.filter(r => r.status === 'Pending').length,
});

function StatCard({ label, value, delta, trend }) {
  const up = trend === 'up';
  return (
    <div className="bg-sb-card border border-sb-border rounded-2xl p-5 shadow-card">
      <div className="flex items-start justify-between">
        <div className="font-mont font-semibold text-[12px] tracking-wide uppercase text-sb-muted">{label}</div>
      </div>
      <div className="mt-3 flex items-baseline gap-2">
        <div className="font-mont font-semibold text-[30px] text-sb-text leading-none tracking-tight">{value.toLocaleString()}</div>
      </div>
      <div className="mt-3 flex items-center gap-1.5 text-[12px] font-mont">
        <span className={[
          "inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-md font-semibold",
          up ? "bg-[#E6F4EA] text-[#2E7D32]" : "bg-[#FDECEC] text-[#D32F2F]"
        ].join(' ')}>
          <Icon name={up ? 'arrowUp' : 'arrowDown'} className="w-3 h-3" />
          {delta}
        </span>
        <span className="text-sb-muted">vs last 30 days</span>
      </div>
    </div>
  );
}

function DashboardPage({ data, openSuspend, openActivate, onRowClick, onResendInvite }) {
  const { role } = useApp();
  const stats = [
    { label:'Total Comedians',    value: data.comedians.length, delta:'+8.2%', trend:'up' },
    { label:'Total Venues',       value: data.venues.length,    delta:'+3.4%', trend:'up' },
    { label:'Total Fans',         value: data.fans.length,      delta:'+12.1%',trend:'up' },
  ];

  const recent = useMemo(() => {
    const merged = [
      ...data.comedians.slice(0,3).map(r => ({...r, type:'Comedian'})),
      ...data.venues.slice(0,2).map(r => ({...r, type:'Venue'})),
      ...data.fans.slice(0,2).map(r => ({...r, type:'Fan'})),
    ];
    return merged.slice(0, 5);
  }, [data]);

  const cols = [
    { key:'name',  label:'Name',     render: r => <NameCell name={r.name} sub={r.email} /> },
    { key:'type',  label:'User Type',render: r => <TypeBadge type={r.type} /> },
    { key:'joined',label:'Joined',   render: r => <span className="text-sb-muted">{r.joined}</span> },
    { key:'status',label:'Status',   render: r => <StatusBadge status={r.status} /> },
  ];

  const dashboardExportRows = useMemo(() => ([
    ...data.comedians.map(r => ({...r, type:'Comedian'})),
    ...data.venues.map(r => ({...r, type:'Venue'})),
    ...data.fans.map(r => ({...r, type:'Fan'})),
  ]), [data]);

  return (
    <div className="px-8 py-7" data-screen-label="01 Dashboard">
      <div className="mb-6">
        <h1 className="font-mont font-semibold text-[24px] text-sb-text tracking-tight">Welcome back, Asha</h1>
      </div>
      <div className="grid grid-cols-3 gap-5 mb-6">
        {stats.map(s => <StatCard key={s.label} {...s} />)}
      </div>

      <h2 className="mb-3 font-mont font-semibold text-[18px] text-sb-text tracking-tight">Recent Signups</h2>
      <div className="flex justify-end mb-3">
        <ExportCSVButton rows={dashboardExportRows} columns={cols} filename="superbit-export.csv" disabled={role !== 'Admin'} />
      </div>
      <DataTable
        rows={recent}
        columns={cols}
        pageSize={5}
        onRowClick={onRowClick}
        hideToolbar
      />
      <p className="mt-4 font-mont text-[11px] text-sb-muted">
        {role === 'Admin'
          ? 'You have full access. Suspend, reactivate, and export are enabled.'
          : 'You are viewing as Employee. Action buttons are hidden; you can search, sort, and view only.'}
      </p>
    </div>
  );
}

function ComediansPage({ rows, openSuspend, openActivate, onRowClick, onAdd, onResendInvite }) {
  const dash = <span className="text-sb-muted">--</span>;
  const cols = [
    { key:'name', label:'Name', render: r => <NameCell name={r.name} sub={r.email} />, search: r => r.name+' '+r.email+' '+r.stageName },
    { key:'stageName', label:'Stage Name', render: r => r.status==='Pending' ? dash : r.stageName, search: r => r.stageName },
    { key:'videos', label:'Videos Uploaded', align:'right', render: r => r.status==='Pending' ? dash : r.videos },
    { key:'venuesPerformed', label:'Venues Performed', align:'right', render: r => r.status==='Pending' ? dash : r.venuesPerformed },
    { key:'followers', label:'Followers', align:'right', render: r => r.status==='Pending' ? dash : r.followers.toLocaleString() },
    { key:'joined', label:'Joined Date', render: r => r.status==='Pending' ? dash : <span className="text-sb-muted">{r.joined}</span> },
    { key:'status', label:'Status', render: r => <StatusBadge status={r.status} /> },
    { key:'actions', label:'Actions', sortable:false, align:'right',
      render: r => <ActionsCell row={r} onSuspend={openSuspend} onActivate={openActivate} onResendInvite={onResendInvite} /> },
  ];
  const followersBuckets = (r, v) => {
    const f = r.followers;
    if (v === '< 1k') return f < 1000;
    if (v === '1k–10k') return f >= 1000 && f < 10000;
    if (v === '10k+') return f >= 10000;
    return true;
  };
  return (
    <div className="px-8 py-7" data-screen-label="02 Comedians">
      <PageHeader title="Comedians" counts={buildCounts(rows)} />
      <DataTable
        rows={rows}
        columns={cols}
        pageSize={8}
        onRowClick={onRowClick}
        addLabel="Invite Comedian"
        onAdd={onAdd}
        searchPlaceholder="Search by name or stage name"
        filters={[
          { key:'status', label:'Status', options:['All','Active','Suspended','Pending'] },
          { key:'followers', label:'Followers', options:['All','< 1k','1k–10k','10k+'], match: followersBuckets },
        ]}
      />
    </div>
  );
}

        pageSize={8}
        onRowClick={onRowClick}

        onAdd={onAdd}
        searchPlaceholder="Search by name or location"

          { key:'status', label:'Status', options:['All','Active','Suspended','Pending'] },

}

/* ============================================================
   INVITE MEMBER MODAL (Internal Users)
   ============================================================ */
function InviteMemberModal({ open, onClose, onInvite }) {
  const [email, setEmail] = useState('');
  const [role, setRole]   = useState('Collaborator');
  const [err, setErr]     = useState({});
  useEffect(() => { if (open) { setEmail(''); setRole('Collaborator'); setErr({}); } }, [open]);
  if (!open) return null;

  const submit = () => {
    const e = {};
    if (!email.trim()) e.email = 'Email is required';
    else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) e.email = 'Enter a valid email';
    setErr(e);
    if (Object.keys(e).length) return;
    onInvite({ email, role });
  };

  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/40" onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="sb-modal-in bg-white border border-sb-border rounded-2xl shadow-modal w-[480px] max-w-[92vw] overflow-hidden">
        <div className="px-6 py-4 border-b border-sb-border flex items-center">
          <h3 className="font-mont font-semibold text-[16px] text-sb-text">Invite</h3>
          <button onClick={onClose} className="ml-auto text-sb-muted hover:text-sb-text">
            <Icon name="close" className="w-4 h-4" />
          </button>
        </div>

        <div className="px-6 py-5 flex flex-col gap-5">
          <label className="block">
            <div className="font-mont font-semibold text-[11px] tracking-[0.08em] uppercase text-sb-muted">Email Address</div>
            <div className="relative mt-1.5">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#9AA4B2]">
                <Icon name="mail" className="w-[16px] h-[16px]" />
              </span>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                placeholder="you@gmail.com"
                onFocus={e => e.target.placeholder = 'you@gmail.com'}
                onBlur={e => e.target.placeholder = ''}
                className={[
                  "font-hanken w-full h-[42px] pl-10 pr-3 rounded-lg bg-white border text-[14px] text-sb-text outline-none focus:border-sb-primary/50",
                  err.email ? "border-sb-error" : "border-sb-border"
                ].join(' ')}
              />
            </div>
            {err.email && <div className="mt-1 font-mont text-[11px] text-sb-error">{err.email}</div>}
          </label>

          <div>
            <div className="font-mont font-semibold text-[11px] tracking-[0.08em] uppercase text-sb-muted">Role</div>
            <div className="mt-2 grid grid-cols-3 gap-2">
              {INTERNAL_ROLES.map(r => {
                const sel = role === r;
                const desc = r === 'Administrator' ? 'Full access'
                          : r === 'Collaborator'   ? 'Manage users'
                          :                          'Plans & invoices';
                return (
                  <button
                    key={r}
                    type="button"
                    onClick={() => setRole(r)}
                    className={[
                      "text-center rounded-lg border px-3 py-3 transition-colors flex items-center justify-center gap-2",
                      sel ? "border-sb-primary bg-[#EEF3FB] ring-1 ring-sb-primary/30"
                          : "border-sb-border bg-white hover:bg-sb-page"
                    ].join(' ')}
                  >
                    <span className={[
                      "w-3.5 h-3.5 rounded-full border flex items-center justify-center shrink-0",
                      sel ? "border-sb-primary" : "border-sb-divider"
                    ].join(' ')}>
                      {sel && <span className="w-1.5 h-1.5 rounded-full bg-sb-primary" />}
                    </span>
                    <span className="font-mont font-semibold text-[13px] text-sb-text">{r}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div className="px-6 py-4 border-t border-sb-border bg-sb-page flex items-center justify-end gap-2">
          <button onClick={onClose} className="h-10 px-4 rounded-md border border-sb-border bg-white text-sb-text font-mont font-semibold text-[13px] hover:bg-white/70">
            Cancel
          </button>
          <button onClick={submit} className="h-10 px-4 rounded-md bg-sb-primary text-white font-mont font-semibold text-[13px] inline-flex items-center gap-2 hover:brightness-110">
            <Icon name="mail" className="w-4 h-4" />
            Invite
          </button>
        </div>
      </div>
    </div>
  );
}

    const v = data.venues   .filter(r => r.status==='Suspended').map(r => ({ ...r, type:'Venue',    suspendedDate: r.joined }));

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [active, setActive] = useState('dashboard');
  const [role, setRole]     = useState('Admin');

  const [comedians, setComedians] = useState(COMEDIANS);
  const [venues, setVenues]       = useState(VENUES);
  const [fans, setFans]           = useState(FANS);
  const [internal, setInternal]   = useState(INTERNAL_USERS);

  const [confirm, setConfirm] = useState({ open:false, kind:null, row:null });
  const [detail, setDetail]   = useState({ open:false, row:null });
  const [addModal, setAddModal] = useState({ open:false, kind:null });
  const [toasts, setToasts]   = useState([]);
  const [inviteOpen, setInviteOpen] = useState(false);

  const dismiss = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
  const pushToast = useCallback((t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, { id, ...t }]);
    setTimeout(() => dismiss(id), 3500);
  }, [dismiss]);

  const updateStatus = (row, status) => {
    if (comedians.some(c => c.id === row.id)) setComedians(rs => rs.map(r => r.id===row.id ? {...r, status} : r));
    else if (venues.some(c => c.id === row.id)) setVenues(rs => rs.map(r => r.id===row.id ? {...r, status} : r));
    else if (fans.some(c => c.id === row.id)) setFans(rs => rs.map(r => r.id===row.id ? {...r, status} : r));
    else setInternal(rs => rs.map(r => r.id===row.id ? {...r, status} : r));
  };

  const openSuspend  = (row) => setConfirm({ open:true, kind:'suspend',  row });
  const openActivate = (row) => setConfirm({ open:true, kind:'activate', row });
  const closeConfirm = () => setConfirm({ open:false, kind:null, row:null });

  const openDetail  = (row) => setDetail({ open:true, row });
  const closeDetail = () => setDetail({ open:false, row:null });

  const openAdd  = (kind) => () => setAddModal({ open:true, kind });
  const closeAdd = () => setAddModal({ open:false, kind:null });

  const today = new Date().toISOString().slice(0,10);
  const handleAdd = (kind, form) => {
    const email = form.email;
    const namePart = email.split('@')[0].replace(/[^a-z]/gi,' ').trim();
    const name = namePart.split(' ').filter(Boolean).map(s => s[0].toUpperCase()+s.slice(1)).join(' ') || email;
    if (kind === 'Comedian') {
      const row = { id:'c'+Date.now(), name, email, stageName:name, videos:0, venuesPerformed:0, followers:0, joined:today, status:'Pending' };
      setComedians(rs => [row, ...rs]);
    } else if (kind === 'Venue') {
      const row = { id:'v'+Date.now(), name, email, location:'—', address:'—', upcoming:0, joined:today, status:'Pending' };
      setVenues(rs => [row, ...rs]);
    } else {
      const row = { id:'f'+Date.now(), name, email, location:'—', joined:today, following:0, favorites:0, lastActive:today, status:'Pending' };
      setFans(rs => [row, ...rs]);
    }
    closeAdd();
    pushToast({ tone:'success', title:'Invite sent', body:`${email} · ${kind}` });
  };

  const handleInvite = ({ email, role: r }) => {
    const namePart = email.split('@')[0].replace(/[^a-z]/gi,' ').trim();
    const name = namePart.split(' ').filter(Boolean).map(s => s[0].toUpperCase()+s.slice(1)).join(' ') || email;
    const row = { id:'iu'+Date.now(), name, email, role:r, joined:today, status:'Pending' };
    setInternal(rs => [row, ...rs]);
    setInviteOpen(false);
    pushToast({ tone:'success', title:'Invite sent', body:`${email} · ${r}` });
  };

  const onLogout  = () => pushToast({ tone:'success', title:'Signed out (demo)', body:'Wire to your auth flow to redirect.' });
  const onProfile = () => setActive('profile');

  const updateRow = (row, patch) => {
    if (comedians.some(c => c.id === row.id)) setComedians(rs => rs.map(r => r.id===row.id ? {...r, ...patch} : r));
    else if (venues.some(c => c.id === row.id)) setVenues(rs => rs.map(r => r.id===row.id ? {...r, ...patch} : r));
    else if (fans.some(c => c.id === row.id)) setFans(rs => rs.map(r => r.id===row.id ? {...r, ...patch} : r));
    else setInternal(rs => rs.map(r => r.id===row.id ? {...r, ...patch} : r));
  };

  const onResendInvite = (row) => {
    const newSent = today;
    const newExpires = addDays(today, 7);
    updateRow(row, { inviteSent: newSent, inviteExpires: newExpires, lastReminded: today });
    pushToast({ tone:'success', title:'Invite resent', body:`${row.email} · expires ${newExpires}` });
  };

  const onCancelInvite = (row) => {
    if (comedians.some(c => c.id === row.id)) setComedians(rs => rs.filter(r => r.id !== row.id));
    else if (venues.some(c => c.id === row.id)) setVenues(rs => rs.filter(r => r.id !== row.id));
    else if (fans.some(c => c.id === row.id)) setFans(rs => rs.filter(r => r.id !== row.id));
    else setInternal(rs => rs.filter(r => r.id !== row.id));
    pushToast({ tone:'danger', title:'Invite canceled', body: row.email });
  };

  const onConfirm = () => {
    const { kind, row } = confirm;
    if (kind === 'suspend')  { updateStatus(row, 'Suspended'); pushToast({ tone:'danger',  title:`${row.name} suspended`, body:'They can no longer post or perform.' }); }
    if (kind === 'activate') { updateStatus(row, 'Active');    pushToast({ tone:'success', title:`${row.name} reactivated`, body:'Account access has been restored.' }); }
    closeConfirm();
  };

  const suspendedCount =
    comedians.filter(r => r.status==='Suspended').length +
    venues.filter(r => r.status==='Suspended').length +
    fans.filter(r => r.status==='Suspended').length;

  const data = { comedians, venues, fans, suspendedCount };
  const counts = {};

  return (
    <AppCtx.Provider value={{ role, setRole }}>
      <div className="flex min-h-screen bg-sb-page">
        <Sidebar active={active} setActive={setActive} counts={counts} />
        <div className="flex-1 min-w-0 flex flex-col">
          <Topbar onProfile={onProfile} onLogout={onLogout} />
          {active === 'dashboard' && <DashboardPage data={data} openSuspend={openSuspend} openActivate={openActivate} onRowClick={openDetail} onResendInvite={onResendInvite} />}
          {active === 'comedians' && <ComediansPage rows={comedians} openSuspend={openSuspend} openActivate={openActivate} onRowClick={openDetail} onAdd={openAdd('Comedian')} onResendInvite={onResendInvite} />}
          {active === 'venues'    && <VenuesPage    rows={venues}    openSuspend={openSuspend} openActivate={openActivate} onRowClick={openDetail} onAdd={openAdd('Venue')} onResendInvite={onResendInvite} />}
          {active === 'fans'      && <FansPage      rows={fans}      openSuspend={openSuspend} openActivate={openActivate} onRowClick={openDetail} onAdd={openAdd('Fan')} onResendInvite={onResendInvite} />}
          {active === 'suspended' && <SuspendedPage data={data} openActivate={openActivate} onRowClick={openDetail} />}
          {active === 'internal'  && <InternalUsersPage rows={internal} openSuspend={openSuspend} openActivate={openActivate} onRowClick={openDetail} onAdd={() => setInviteOpen(true)} onResendInvite={onResendInvite} />}
          {active === 'profile'   && <ProfilePage role={role} />}
        </div>

        <ConfirmationModal open={confirm.open} kind={confirm.kind} name={confirm.row?.name} onCancel={closeConfirm} onConfirm={onConfirm} />
        <UserDetailModal open={detail.open} row={detail.row} onClose={closeDetail} onSuspend={openSuspend} onActivate={openActivate} onResendInvite={onResendInvite} onCancelInvite={onCancelInvite} />
        <AddMemberModal open={addModal.open} kind={addModal.kind} onClose={closeAdd} onAdd={handleAdd} />
        <InviteMemberModal open={inviteOpen} onClose={() => setInviteOpen(false)} onInvite={handleInvite} />
        <Toasts toasts={toasts} dismiss={dismiss} />
      </div>
    </AppCtx.Provider>
  );
}
