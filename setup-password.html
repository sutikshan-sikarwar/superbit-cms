<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Setup Password</title>
<link rel="icon" type="image/svg+xml" href="superbit-logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --banner: #0F4C94;
    --bg: #F5F7FB;
    --card: #FFFFFF;
    --border: #E7E8EC;
    --text: #333333;
    --muted: #777777;
    --placeholder: #555555;
    --primary: #0F4C94;
    --accent: oklch(0.62 0.20 25); /* original accent — not a copyrighted mark */
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hanken Grotesk", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .banner {
    background: var(--banner);
    height: 260px;
    width: 100%;
    position: relative;
  }

  .brand {
    position: absolute;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    line-height: 0;
  }

  .stage {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
  }

  .card-wrap {
    position: relative;
    margin-top: -120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 80px;
  }

  .card {
    width: 420px;
    max-width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(15, 76, 148, 0.04),
                0 8px 24px rgba(15, 76, 148, 0.08);
    padding: 36px 36px 32px;
  }

  h1.title {
    margin: 0 0 28px;
    text-align: center;
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.2;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .btn {
    width: 100%;
    height: 44px;
    border-radius: 8px;
    font-family: "Hanken Grotesk", sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 24px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }

  .btn-google {
    background: #FFFFFF;
    border: 1px solid var(--primary);
    color: var(--primary);
  }
  .btn-google:hover {
    background: #F4F8FE;
  }

  .btn-primary {
    background: var(--primary);
    color: #FFFFFF;
    border: 1px solid var(--primary);
    border-radius: 9999px; /* pill */
  }
  .btn-primary:hover {
    background: #0d4385;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-family: "Hanken Grotesk", sans-serif;
    font-size: 14px;
    font-weight: 500;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  label.lbl {
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: 100%;
    letter-spacing: 0;
    color: var(--text);
  }

  .input-shell {
    position: relative;
    display: flex;
    align-items: center;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #FFFFFF;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .input-shell:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(15, 76, 148, 0.10);
  }

  .input-shell input {
    flex: 1;
    height: 100%;
    border: 0;
    background: transparent;
    outline: none;
    padding: 0 14px;
    font-family: "Hanken Grotesk", sans-serif;
    font-size: 15px;
    color: var(--text);
  }
  .input-shell input::placeholder {
    color: var(--placeholder);
    opacity: 1;
  }

  .input-shell.readonly {
    background: #F5F7FB;
  }
  .input-shell.readonly input {
    color: var(--muted);
    cursor: not-allowed;
  }
  .input-shell.readonly:focus-within {
    border-color: var(--border);
    box-shadow: none;
  }

  .eye-btn {
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 0 12px;
    height: 100%;
    display: inline-flex;
    align-items: center;
    color: var(--muted);
  }
  .eye-btn:hover { color: var(--text); }

  .login-row { margin-top: 8px; }

  .forgot {
    margin-top: 18px;
    text-align: center;
  }
  .forgot a {
    color: var(--primary);
    font-family: "Hanken Grotesk", sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
  }
  .forgot a:hover { text-decoration: underline; }

  .signup {
    margin-top: 28px;
    text-align: center;
    font-family: "Montserrat", sans-serif;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .signup a {
    display: block;
    margin-top: 6px;
    color: var(--primary);
    font-family: "Montserrat", sans-serif;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
  }
  .signup a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .card { padding: 28px 22px 24px; }
    .banner { height: 220px; }
    .brand { top: 48px; }
    .card-wrap { margin-top: -100px; }
  }
</style>
</head>

    </div>
  </header>

  <main class="stage">
    <div class="card-wrap">
      <section class="card" aria-labelledby="login-title">
        <h1 id="login-title" class="title">Setup Password</h1>

        <form id="login-form" novalidate>
          <div class="field">
            <label class="lbl" for="invite-email">Email*</label>
            <div class="input-shell readonly">
              <input id="invite-email" name="invite-email" type="email" value="invitee@superbit.com" placeholder="you@gmail.com" readonly aria-readonly="true" tabindex="-1" />
            </div>
          </div>

          <div class="field">
            <label class="lbl" for="password">Password*</label>
            <div class="input-shell">
              <input id="password" name="password" type="password" autocomplete="new-password" data-placeholder="Enter your password" />
              <button class="eye-btn" type="button" id="togglePw" aria-label="Show password">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label class="lbl" for="reenter-password">Re-enter Password*</label>
            <div class="input-shell">
              <input id="reenter-password" name="reenter-password" type="password" autocomplete="new-password" data-placeholder="Re-enter your password" />
            </div>
          </div>

          <div class="login-row">
            <button class="btn btn-primary" type="submit" id="okBtn">Submit</button>
          </div>
        </form>
      </section>
    </div>
  </main>

<script>
  document.querySelectorAll('.input-shell input').forEach(function (input) {
    input.addEventListener('focus', function () {
      input.setAttribute('placeholder', input.dataset.placeholder || '');
    });
    input.addEventListener('blur', function () {
      if (!input.value) input.setAttribute('placeholder', '');
    });
  });

  (function () {
    var pw = document.getElementById('password');
    var toggle = document.getElementById('togglePw');
    var icon = document.getElementById('eyeIcon');
    toggle.addEventListener('click', function () {
      var showing = pw.getAttribute('type') === 'text';
      pw.setAttribute('type', showing ? 'password' : 'text');
      toggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      icon.innerHTML = showing
        ? '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M3 3l18 18"/><path d="M10.6 6.1A10.9 10.9 0 0 1 12 6c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.3 4.2"/><path d="M6.6 6.6A17.7 17.7 0 0 0 2 13s3.5 7 10 7a10.8 10.8 0 0 0 5.4-1.5"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>';
    });
  })();

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    window.location.href = 'password-successful.html';
  });
</script>
</body>
</html>
